spring:
  application:
    name: sgie-club-boyaca
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sgie}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Bogota
  flyway:
    enabled: true

server:
  port: 8080

sgie:
  notificaciones:
    scheduler:
      fixed-delay-ms: ${SGIE_NOTIFICACIONES_SCHEDULER_FIXED_DELAY_MS:60000}
      limite: ${SGIE_NOTIFICACIONES_SCHEDULER_LIMITE:20}
    personal:
      grupo-whatsapp-id: ${SGIE_NOTIFICACIONES_PERSONAL_GRUPO_WHATSAPP_ID:}
    prueba-plato:
      chef-telefono: ${SGIE_NOTIFICACIONES_PRUEBA_PLATO_CHEF_TELEFONO:}
      gerente-telefono: ${SGIE_NOTIFICACIONES_PRUEBA_PLATO_GERENTE_TELEFONO:}
      tesorero-telefono: ${SGIE_NOTIFICACIONES_PRUEBA_PLATO_TESORERO_TELEFONO:}
  calendario:
    scheduler:
      fixed-delay-ms: ${SGIE_CALENDARIO_SCHEDULER_FIXED_DELAY_MS:60000}
      limite: ${SGIE_CALENDARIO_SCHEDULER_LIMITE:20}
    prueba-plato:
      chef-correo: ${SGIE_CALENDARIO_PRUEBA_PLATO_CHEF_CORREO:}
      gerente-correo: ${SGIE_CALENDARIO_PRUEBA_PLATO_GERENTE_CORREO:}
      tesorero-correo: ${SGIE_CALENDARIO_PRUEBA_PLATO_TESORERO_CORREO:}
    evento-confirmado:
      asistentes-correos: ${SGIE_CALENDARIO_EVENTO_CONFIRMADO_ASISTENTES_CORREOS:}
    google:
      enabled: ${SGIE_CALENDARIO_GOOGLE_ENABLED:false}
      calendar-id: ${SGIE_CALENDARIO_GOOGLE_CALENDAR_ID:primary}
      oauth-client-id: ${SGIE_CALENDARIO_GOOGLE_OAUTH_CLIENT_ID:}
      oauth-client-secret: ${SGIE_CALENDARIO_GOOGLE_OAUTH_CLIENT_SECRET:}
      oauth-refresh-token: ${SGIE_CALENDARIO_GOOGLE_OAUTH_REFRESH_TOKEN:}
      application-name: ${SGIE_CALENDARIO_GOOGLE_APPLICATION_NAME:SGIE Club Boyaca}
      time-zone: ${SGIE_CALENDARIO_GOOGLE_TIME_ZONE:America/Bogota}
      send-updates: ${SGIE_CALENDARIO_GOOGLE_SEND_UPDATES:all}
      include-attendees: ${SGIE_CALENDARIO_GOOGLE_INCLUDE_ATTENDEES:true}
